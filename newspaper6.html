<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newspaper 6 Gallery</title>
    <link rel="stylesheet" href="krds-ui.css">
    <script src="https://unpkg.com/@panzoom/panzoom@4.6.2/dist/panzoom.min.js"></script>
</head>
<body class="gallery-page">
    <div id="image-gallery" aria-label="매일경제 지면 목록"></div>

    <script>
        // URL에서 날짜를 가져와 이미지 URL 업데이트
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const gallery = document.getElementById('image-gallery');

        function loadImages() {
            const year = date.slice(0, 4);
            const month = date.slice(4, 6);
            const day = date.slice(6, 8);
            for (let i = 1; i <= 32; i++) {
                const pageNumber = String(i).padStart(2, '0'); // 01부터 32까지 생성
                const imgSrc = `https://file2.mk.co.kr/mkde/${year}/${month}/${day}/tmp_page/01_${pageNumber}_ORG.jpg`;
                const imgElement = document.createElement('img');
                imgElement.src = imgSrc;
                imgElement.alt = `매일경제 지면 ${pageNumber}`;
                const container = document.createElement('div');
                container.className = 'image-container';
                container.appendChild(imgElement);
                gallery.appendChild(container);
                
                // Panzoom 적용
                const panzoom = Panzoom(imgElement, {
                    maxScale: 3,  // 최대 확대 배율을 3로 설정
                    contain: 'outside',
                });
                let initialScale = panzoom.getScale();
                let initialTransform = imgElement.style.transform;
                function rememberInitialTransform() {
                    if (currentScale <= initialScale + 0.01) {
                        initialScale = panzoom.getScale();
                        initialTransform = imgElement.style.transform;
                    }
                }

                imgElement.addEventListener('load', rememberInitialTransform);
                requestAnimationFrame(() => requestAnimationFrame(rememberInitialTransform));

                // 터치 이벤트 처리
                let initialDistance = 0;
                let currentScale = 1;
                let restoredInitialScale = false;
                let touchStartY = 0;
                let tapStartX = 0;
                let tapStartY = 0;
                let touchMoved = false;
                let lastTapTime = 0;
                let lastTapX = 0;
                let lastTapY = 0;

                imgElement.addEventListener('touchstart', (event) => {
                    if (event.touches.length === 2) {
                        initialDistance = getDistance(event.touches);
                    } else if (event.touches.length === 1) {
                        tapStartX = event.touches[0].clientX;
                        tapStartY = event.touches[0].clientY;
                        touchStartY = event.touches[0].clientY;
                        touchMoved = false;
                    }
                }, { capture: true });

                imgElement.addEventListener('touchmove', (event) => {
                    if (event.touches.length === 2) {
                        const currentDistance = getDistance(event.touches);
                        if (initialDistance > 0) {
                            const scaleChange = currentDistance / initialDistance;

                            // 확대 속도를 높이기 위해 scaleChange에 비율을 곱함
                            const speedFactor = 3.5; // 이 값을 조정하여 속도를 변경
                            let targetScale = currentScale * scaleChange * speedFactor;

                            panzoom.zoom(targetScale, { animate: false });
                        }
                    } else if (event.touches.length === 1) {
                        const touchEndY = event.touches[0].clientY;
                        if (Math.abs(event.touches[0].clientX - tapStartX) > 10 || Math.abs(touchEndY - tapStartY) > 10) {
                            touchMoved = true;
                        }
                        window.scrollBy(0, touchStartY - touchEndY);
                        touchStartY = touchEndY;
                    }
                });

                imgElement.addEventListener('touchend', (event) => {
                    if (initialDistance === 0 && event.changedTouches.length === 1 && !touchMoved) {
                        const now = Date.now();
                        const tapX = event.changedTouches[0].clientX;
                        const tapY = event.changedTouches[0].clientY;
                        const isDoubleTap = now - lastTapTime < 300 &&
                            Math.abs(tapX - lastTapX) < 30 &&
                            Math.abs(tapY - lastTapY) < 30;

                        if (isDoubleTap) {
                            event.preventDefault();
                            if (currentScale > initialScale + 0.01) {
                                panzoom.reset({ animate: false });
                                panzoom.zoom(initialScale, { animate: false, force: true });
                                imgElement.style.transform = initialTransform;
                                currentScale = initialScale;
                                restoredInitialScale = true;
                            } else {
                                initialScale = panzoom.getScale();
                                initialTransform = imgElement.style.transform;
                                const zoomValues = panzoom.zoom(3, { animate: false, force: true });
                                currentScale = zoomValues.scale;
                            }
                            lastTapTime = 0;
                        } else {
                            lastTapTime = now;
                            lastTapX = tapX;
                            lastTapY = tapY;
                        }
                    }

                    if (restoredInitialScale) {
                        restoredInitialScale = false;
                    } else {
                        currentScale = panzoom.getScale();
                    }
                    initialDistance = 0;
                }, { passive: false });

                container.addEventListener('wheel', panzoom.zoomWithWheel);

                // 두 점 사이의 거리 계산 함수
                function getDistance(touches) {
                    const [touch1, touch2] = touches;
                    const dx = touch1.clientX - touch2.clientX;
                    const dy = touch1.clientY - touch2.clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                }
            }
        }

        // 스타일시트가 로드된 후에 이미지 로드
        window.addEventListener('load', loadImages);
    </script>
</body>
</html>
