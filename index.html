<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Newspapers</title>
    <link rel="stylesheet" href="krds-ui.css">
</head>

<body class="viewer-page">
    <div class="top-frame" role="banner">
        <div class="header">
            <h1>가판</h1>
            <div class="date-input">
                <label for="date">날짜 선택: </label>
                <input type="date" id="date">
                <button type="button" onclick="updateImages()">업데이트</button>
            </div>
        </div>
        <div class="menu" role="navigation" aria-label="신문 선택">
            <button type="button" onclick="showNewspaper('newspaper1.html')">서울경제</button>
            <button type="button" onclick="showNewspaper('newspaper2.html')">한국경제</button>
            <button type="button" onclick="showNewspaper('newspaper3.html')">국민일보</button>
            <button type="button" onclick="showNewspaper('newspaper4.html')">세계일보</button>
            <button type="button" onclick="showNewspaper('newspaper6.html')">매일경제</button>
            <button type="button" onclick="openInNewWindow('http://premier.seoul.co.kr/viewer/viewer.aspx')">서울신문</button>
            <button type="button" onclick="openInNewWindow('http://early.chosun.com')">조선일보</button>
        </div>
    </div>

    <div class="content" role="main">
        <div class="frame-container">
            <iframe id="newspaper-frame" title="신문 지면 보기"></iframe>
        </div>
    </div>

    <script>
        // Initialize date picker with tomorrow's date
        const dateInput = document.getElementById('date');
        dateInput.valueAsDate = new Date(Date.now() + 86400000);
        dateInput.addEventListener('change', updateImages);

        // Core functions
        function updateImages() {
            const frame = document.getElementById('newspaper-frame');
            const currentPath = frame.src.split('?')[0];
            frame.src = `${currentPath}?date=${dateInput.value.replace(/-/g, '')}`;
        }

        function showNewspaper(page) {
            document.getElementById('newspaper-frame').src =
                `${page}?date=${dateInput.value.replace(/-/g, '')}`;
        }

        function openInNewWindow(url) {
            window.open(url, '_blank', 'noopener');
        }

        function openImagePopup() {
            window.open("seoul.png", "imagePopup", "width=1075,height=1081");
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            showNewspaper('newspaper1.html');
        });
    </script>
</body>

</html>
